services:
  goaway:
    container_name: goaway
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    user: 1000:1000
    volumes:
      - ./:/app
    environment:
      - DNS_PORT=6121
      - WEBSITE_PORT=8080
      - PROXY_PORT=5353
    ports:
      - "6121:6121/udp"
      - "6121:6121/tcp"
      - "5353:5353/udp"
      - "5353:5353/tcp"
      - "8080:8080/tcp"
      - "9012:9012/tcp"
      - "6067:67/udp"
    cap_add:
      - NET_BIND_SERVICE
      - NET_RAW
      - NET_ADMIN

