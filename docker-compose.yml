services:
  goaway:
    image: ghcr.io/rasty94/goaway:v0.92
    build:
      context: .
      dockerfile: Dockerfile.multi
    container_name: goaway
    restart: unless-stopped
    # volumes:
    #   - /path/to/config:/app/config    # Custom settings.yaml configuration
    #   - /path/to/data:/app/data        # Database storage location
    environment:
      - DNS_PORT=${DNS_PORT:-53}
      - WEBSITE_PORT=${WEBSITE_PORT:-8080}
    ports:
      - "${DNS_PORT:-53}:${DNS_PORT:-53}/udp"
      - "${DNS_PORT:-53}:${DNS_PORT:-53}/tcp"
      - "${PROXY_PORT:-5354}:${PROXY_PORT:-5354}/udp"
      - "${PROXY_PORT:-5354}:${PROXY_PORT:-5354}/tcp"
      - "${WEBSITE_PORT:-8080}:${WEBSITE_PORT:-8080}/tcp"
      - "67:67/udp"
      - "547:547/udp"
    cap_add:
      - NET_BIND_SERVICE
      - NET_RAW
      - NET_ADMIN
    # Note: For DHCP server to function correctly, host networking is often required:
    # network_mode: host

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${WEBSITE_PORT:-8080}/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

