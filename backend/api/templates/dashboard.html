<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoAway - Premium DNS Dashboard</title>
    <script src="https://unpkg.com/htmx.org@2.0.0"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #09090b;
            --card-bg: rgba(24, 24, 27, 0.4);
            --accent-blue: #3b82f6;
            --accent-purple: #8b5cf6;
            --glass-border: rgba(63, 63, 70, 0.4);
        }
        body { 
            background-color: var(--bg-dark); 
            color: #fafaf9; 
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
        }
        .glass { 
            background: var(--card-bg); 
            backdrop-filter: blur(16px); 
            border: 1px solid var(--glass-border); 
        }
        .sidebar-item {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .sidebar-item:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: translateX(4px);
        }
        .sidebar-item.active {
            background: rgba(59, 130, 246, 0.1);
            border-left: 3px solid var(--accent-blue);
            color: white;
        }
        .gradient-text {
            background: linear-gradient(135deg, #fff 0%, #a1a1aa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #3f3f46; }
        
        /* Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="flex h-screen w-full" hx-boost="true">
    <!-- Sidebar -->
    <aside class="w-64 glass border-r border-stone-800 flex flex-col shrink-0 z-20">
        <div class="p-8">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-600/20">
                    <i data-lucide="shield" class="text-white w-6 h-6"></i>
                </div>
                <div>
                    <h1 class="text-xl font-black tracking-tight text-white leading-tight">GoAway</h1>
                    <p class="text-[10px] font-bold text-stone-500 uppercase tracking-widest">Enterprise DNS</p>
                </div>
            </div>
        </div>

        <nav class="flex-1 px-4 space-y-2 mt-4">
            <button hx-get="/api/native/view/overview" hx-target="#main-content" 
                    class="sidebar-item active w-full flex items-center gap-4 px-4 py-3 rounded-xl text-stone-400 font-semibold group">
                <i data-lucide="layout-dashboard" class="w-5 h-5 group-hover:text-blue-400 transition-colors"></i>
                <span>Dashboard</span>
            </button>
            <button hx-get="/api/native/view/dns" hx-target="#main-content" 
                    class="sidebar-item w-full flex items-center gap-4 px-4 py-3 rounded-xl text-stone-400 font-semibold group">
                <i data-lucide="globe" class="w-5 h-5 group-hover:text-blue-400 transition-colors"></i>
                <span>DNS Mgmt</span>
            </button>
            <button hx-get="/api/native/view/dhcp" hx-target="#main-content" 
                    class="sidebar-item w-full flex items-center gap-4 px-4 py-3 rounded-xl text-stone-400 font-semibold group">
                <i data-lucide="cpu" class="w-5 h-5 group-hover:text-blue-400 transition-colors"></i>
                <span>DHCP Leases</span>
            </button>
            <button hx-get="/api/native/view/policies" hx-target="#main-content" 
                    class="sidebar-item w-full flex items-center gap-4 px-4 py-3 rounded-xl text-stone-400 font-semibold group">
                <i data-lucide="lock" class="w-5 h-5 group-hover:text-blue-400 transition-colors"></i>
                <span>Policies</span>
            </button>
            <button hx-get="/api/native/dashboard/cluster" hx-target="#main-content" 
                    class="sidebar-item w-full flex items-center gap-4 px-4 py-3 rounded-xl text-stone-400 font-semibold group">
                <i data-lucide="server" class="w-5 h-5 group-hover:text-blue-400 transition-colors"></i>
                <span>HA Cluster</span>
            </button>
            <div class="pt-8 pb-4 px-4">
                <p class="text-[10px] font-black text-stone-600 uppercase tracking-widest">Configuration</p>
            </div>
            <button hx-get="/api/native/view/settings" hx-target="#main-content" 
                    class="sidebar-item w-full flex items-center gap-4 px-4 py-3 rounded-xl text-stone-400 font-semibold group">
                <i data-lucide="settings" class="w-5 h-5 group-hover:text-blue-400 transition-colors"></i>
                <span>Settings</span>
            </button>
        </nav>

        <div class="p-6">
            <div class="glass p-4 rounded-2xl border-stone-800 bg-blue-500/5">
                <p class="text-[10px] font-bold text-blue-400 uppercase tracking-tighter mb-1">System Health</p>
                <div class="flex items-center justify-between mb-2">
                    <span class="text-xs font-semibold text-stone-300">Secure & Online</span>
                    <span class="w-2 h-2 bg-green-500 rounded-full shadow-lg shadow-green-500/40"></span>
                </div>
                <div class="w-full bg-stone-800 h-1.5 rounded-full overflow-hidden">
                    <div class="bg-blue-600 h-full w-[85%] rounded-full"></div>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col min-w-0 bg-stone-950/20">
        <!-- Top Bar -->
        <header class="h-20 shrink-0 border-b border-stone-800 flex items-center justify-between px-10 glass z-10">
            <div class="flex items-center gap-6">
                <h2 id="page-title" class="text-xl font-bold text-white">Network Overview</h2>
                <div class="h-6 w-px bg-stone-800"></div>
                <div id="cache-indicator" hx-get="/api/native/cache/status" hx-trigger="load" hx-swap="outerHTML"></div>
            </div>
            <div class="flex items-center gap-4">
                <button class="glass p-2.5 rounded-xl text-stone-400 hover:text-white transition-colors">
                    <i data-lucide="bell" class="w-5 h-5"></i>
                </button>
                <a href="/" class="bg-white/5 hover:bg-white/10 px-4 py-2 rounded-xl text-sm font-bold text-white transition-all border border-stone-800">
                    Switch to React
                </a>
            </div>
        </header>

        <!-- Dynamic Content Area -->
        <div id="main-content" 
             hx-get="/api/native/view/overview" 
             hx-trigger="load"
             class="flex-1 overflow-y-auto p-10 custom-scrollbar">
            <!-- Partials rendered here -->
            <div class="flex items-center justify-center h-full">
                <div class="flex flex-col items-center gap-4">
                    <div class="w-12 h-12 border-4 border-blue-600/20 border-t-blue-600 rounded-full animate-spin"></div>
                    <p class="text-stone-500 font-bold uppercase tracking-widest text-xs">Initializing Dashboard...</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Lucide icons initialization
        lucide.createIcons();

        // Handle sidebar active states
        document.body.addEventListener('htmx:afterOnLoad', function(evt) {
            if (evt.detail.target.id === 'main-content') {
                lucide.createIcons();
                // Update active state in sidebar
                document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
                const trigger = evt.detail.elt;
                if (trigger.classList.contains('sidebar-item')) {
                    trigger.classList.add('active');
                }
            }
        });
    </script>
</body>
</html>
